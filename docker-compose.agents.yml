version: '3.8'

services:
  # Sandbox image — built first so the Green Agent can use it for code execution
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: logomesh-sandbox:latest
    profiles: ["build-only"]  # Not a running service — just builds the image

  green:
    build:
      context: .
      dockerfile: Dockerfile.green
    depends_on:
      sandbox:
        condition: service_started
        required: false
    ports:
      - "9009:9009"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - RED_AGENT_MCTS=true
      - RED_AGENT_MAX_STEPS=5
      - RED_AGENT_TIMEOUT=20
      - ENABLE_REFINEMENT=true
      - SANDBOX_TIMEOUT=15
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - battle-data:/app/data
    command: ["--host", "0.0.0.0", "--port", "9009"]

  purple:
    build:
      context: .
      dockerfile: Dockerfile.purple
    ports:
      - "9010:9010"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    command: ["--host", "0.0.0.0", "--port", "9010"]

volumes:
  battle-data:
